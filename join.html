<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the IX Ecosystem</title>
    <meta name="description" content="Free to join. Earn IXT, unlock discounts, and participate in the IX ecosystem.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@1,400;1,500&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

        :root {
            --black: #0A0A0A;
            --charcoal: #1A1A1A;
            --dark-grey: #333333;
            --mid-grey: #666666;
            --light-grey: #999999;
            --pale-grey: #E8E8E8;
            --off-white: #F5F5F5;
            --white: #FFFFFF;
            --bronze: #9B8B6E;
            --warm-light: #B8A88A;
            --warm-bg: #F8F6F3;
            --teal: #3F5A5A;
            --teal-light: #4D6B6B;
            --sage: #6B8A7E;
            --cream: #F4F0EB;
            --caramel: #D4A574;
            --caramel-light: #E0B98A;
        }

        body {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            color: var(--dark-grey);
            line-height: 1.7;
            background: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 500; line-height: 1.15; }
        .label { font-family: 'DM Mono', monospace; font-size: 0.75rem; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; color: var(--bronze); }
        .editorial { font-family: 'Crimson Pro', serif; font-style: italic; }

        /* ===== NAV BAR ===== */
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 20px 0;
            background: rgba(10, 10, 10, 0.85);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; gap: 14px; }
        .nav-mark { display: flex; align-items: center; gap: 14px; text-decoration: none; }
        .nav-ix { width: 36px; height: 36px; border: 1.5px solid var(--bronze); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 0.85rem; color: var(--white); letter-spacing: 0.08em; }
        .nav-name { font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem; font-weight: 300; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.4); }

        /* ===== FORM CARD ===== */
        .form-wrapper {
            width: 100%;
            max-width: 520px;
            margin-top: 80px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .form-header .label { margin-bottom: 16px; display: block; }

        .form-header h1 {
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            color: var(--white);
            margin-bottom: 16px;
        }

        .form-header p {
            color: var(--light-grey);
            font-size: 1rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .form-card {
            background: var(--charcoal);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 4px;
            padding: 48px 40px;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--light-grey);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: var(--white);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input::placeholder { color: var(--mid-grey); }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--caramel);
        }

        .form-group select option {
            background: var(--charcoal);
            color: var(--white);
        }

        .form-group .hint {
            font-size: 0.78rem;
            color: var(--mid-grey);
            margin-top: 6px;
        }

        /* ===== TIER PICKER ===== */
        .tier-picker {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 28px;
        }

        .tier-option {
            position: relative;
            cursor: pointer;
        }

        .tier-option input { position: absolute; opacity: 0; width: 0; height: 0; }

        .tier-option .tier-card {
            padding: 24px 20px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .tier-option input:checked + .tier-card {
            border-color: var(--caramel);
            background: rgba(212, 165, 116, 0.06);
        }

        .tier-card h3 {
            font-size: 1.1rem;
            color: var(--white);
            margin-bottom: 4px;
        }

        .tier-card .tier-price {
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            color: var(--caramel);
            margin-bottom: 8px;
        }

        .tier-card .tier-desc {
            font-size: 0.78rem;
            color: var(--mid-grey);
            line-height: 1.5;
        }

        .tier-label {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--light-grey);
            margin-bottom: 12px;
        }

        /* ===== SUBMIT ===== */
        .form-submit {
            width: 100%;
            padding: 16px 32px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            color: var(--black);
            background: var(--cream);
            border: 1px solid var(--cream);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-submit:hover {
            background: var(--warm-light);
            border-color: var(--warm-light);
        }

        .form-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== SUCCESS STATE ===== */
        .form-success {
            display: none;
            text-align: center;
            padding: 60px 40px;
        }

        .form-success.visible { display: block; }

        .form-success h2 {
            color: var(--white);
            font-size: 1.6rem;
            margin-bottom: 12px;
        }

        .form-success p {
            color: var(--light-grey);
            font-size: 1rem;
        }

        .form-success .check {
            width: 56px;
            height: 56px;
            border: 2px solid var(--caramel);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        /* ===== FOOTER ===== */
        .form-footer {
            text-align: center;
            margin-top: 32px;
        }

        .form-footer a {
            color: var(--light-grey);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .form-footer a:hover { color: var(--white); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .form-card { padding: 32px 24px; }
            .tier-picker { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- NAV -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-mark">
                <div class="nav-ix">IX</div>
                <span class="nav-name">Initiative X</span>
            </a>
        </div>
    </nav>

    <div class="form-wrapper">
        <div class="form-header">
            <span class="label">Membership</span>
            <h1>Join the IX Ecosystem</h1>
            <p>Free to join as an Explorer. Upgrade to Patron for full access.</p>
        </div>

        <div class="form-card" id="formCard">
            <form id="joinForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone <span style="opacity: 0.5;">(optional)</span></label>
                    <input type="tel" id="phone" name="phone" placeholder="+44">
                </div>

                <span class="tier-label">Choose your tier</span>
                <div class="tier-picker">
                    <label class="tier-option">
                        <input type="radio" name="tier" value="Explorer" checked>
                        <div class="tier-card">
                            <h3>Explorer</h3>
                            <div class="tier-price">Free</div>
                            <div class="tier-desc">1% IXT earn on spend. Access the ecosystem.</div>
                        </div>
                    </label>
                    <label class="tier-option">
                        <input type="radio" name="tier" value="Patron">
                        <div class="tier-card">
                            <h3>Patron</h3>
                            <div class="tier-price">&pound;30/mo</div>
                            <div class="tier-desc">10% discount. Events. Investor access. Full IXT earning.</div>
                        </div>
                    </label>
                </div>

                <button type="submit" class="form-submit" id="submitBtn">Join the Ecosystem</button>
            </form>
        </div>

        <!-- Success state -->
        <div class="form-card form-success" id="formSuccess">
            <div class="check">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#D4A574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <h2>You're in.</h2>
            <p>Welcome to the IX ecosystem. We'll be in touch soon.</p>
        </div>

        <div class="form-footer">
            <a href="index.html">&larr; Back to initiativex.co.uk</a>
        </div>
    </div>

    <script>
        document.getElementById('joinForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Joining...';

            var data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                tier: document.querySelector('input[name="tier"]:checked').value
            };

            // POST to n8n webhook — IX Join Form Handler
            fetch('https://initiativex.app.n8n.cloud/webhook/ix-join', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(function(response) { return response.json(); })
            .then(function(result) {
                if (result.checkoutUrl) {
                    window.location.href = result.checkoutUrl;
                } else {
                    document.getElementById('formCard').style.display = 'none';
                    document.getElementById('formSuccess').classList.add('visible');
                }
            })
            .catch(function() {
                document.getElementById('formCard').style.display = 'none';
                document.getElementById('formSuccess').classList.add('visible');
            });
        });
    </script>
</body>
</html>
